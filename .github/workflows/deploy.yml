name: Build and Deploy

on:
  workflow_dispatch:
    inputs:
      full_sync:
        description: 'Force full sync (ignore cache)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e .

      - name: Copy config
        run: cp config.example.yaml config.yaml

      - name: Restore sync state
        if: ${{ github.event.inputs.full_sync != 'true' }}
        uses: actions/cache@v4
        with:
          path: state
          key: halo-ssg-sync-state

      - name: Incremental sync
        if: ${{ github.event.inputs.full_sync != 'true' }}
        run: halo-ssg --config config.yaml sync

      - name: Full sync
        if: ${{ github.event.inputs.full_sync == 'true' }}
        run: halo-ssg --config config.yaml sync --force

      - name: Add .nojekyll
        run: touch output/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          force_orphan: true
